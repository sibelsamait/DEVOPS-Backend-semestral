version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-proyectodb
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-proyecto_db}
      MYSQL_USER: ${DB_USERNAME:-admin}
      MYSQL_PASSWORD: ${DB_PASSWORD:-admin123}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-admin123}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - despachos-network

  backend-despachos:
    image: ${DOCKER_USERNAME}/backend-despachos:latest
    container_name: app-despachos
    restart: always
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/${DB_NAME:-proyecto_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-admin}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-admin123}
      - SERVER_PORT=8081
      - DB_ENDPOINT=mysql-db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-proyecto_db}
      - DB_USERNAME=${DB_USERNAME:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-admin123}
    depends_on:
      - mysql-db
    networks:
      - despachos-network

volumes:
  db_data:
    driver: local

networks:
  despachos-network:
    driver: bridge
