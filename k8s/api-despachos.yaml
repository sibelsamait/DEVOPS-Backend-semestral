apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-despachos-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-despachos
  template:
    metadata:
      labels:
        app: api-despachos
    spec:
      containers:
      - name: despachos
        image: 058264296562.dkr.ecr.us-east-1.amazonaws.com/backend-despachos:latest
        ports:
        - containerPort: 8081
        env:
        - name: SERVER_PORT
          value: "8081" # Fuerza a Spring Boot a usar este puerto
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql-db:3306/proyecto_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom: { secretKeyRef: { name: db-secrets, key: DB_USERNAME } }
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom: { secretKeyRef: { name: db-secrets, key: DB_PASSWORD } }
        - name: DB_ENDPOINT
          value: "mysql-db"
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "250m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api-despachos-service
spec:
  selector:
    app: api-despachos
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8081
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-despachos-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-despachos-deploy
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50