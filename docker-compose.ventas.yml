version: '3.8'

services:
  backend-ventas:
    image: ${DOCKER_USERNAME}/backend-ventas:latest
    container_name: p2_backend_ventas
    restart: on-failure
    ports:
      - "8082:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=mysql
      # OJO: En la máquina de Ventas, usaremos la variable ${DB_HOST_IP}
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST_IP}:3306/${DB_NAME:-p2_db}?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-admin_p2}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-super_secret_password}
    networks:
      - ventas_network

networks:
  ventas_network:
    driver: bridge