spring.application.name=Springboot-API-REST

# Puerto del servidor (lee la variable de entorno, usa 8080 si no se define)
server.port=${SERVER_PORT:8080}

# Configuración de la base de datos MySQL (lee las variables de entorno)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA y Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuración de Swagger/Springdoc
springdoc.swagger-ui.path=/swagger-ui.html
