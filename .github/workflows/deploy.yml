name: CI/CD Backend Monorepo EKS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  EKS_CLUSTER_NAME: ep3-devops-cluster 
  AWS_REGION: us-east-1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and Push API Ventas
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Entramos a la carpeta de Ventas según tu estructura real
        cd back-Ventas_SpringBoot/Springboot-API-REST
        docker build -t $ECR_REGISTRY/ep3devops/backend-ventas:$IMAGE_TAG .
        docker build -t $ECR_REGISTRY/ep3devops/backend-ventas:latest .
        docker push $ECR_REGISTRY/ep3devops/backend-ventas:$IMAGE_TAG
        docker push $ECR_REGISTRY/ep3devops/backend-ventas:latest

    - name: Build and Push API Despachos
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Volvemos a la raíz y entramos a Despachos
        cd ${{ github.workspace }}/back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        docker build -t $ECR_REGISTRY/ep3devops/backend-despachos:$IMAGE_TAG .
        docker build -t $ECR_REGISTRY/ep3devops/backend-despachos:latest .
        docker push $ECR_REGISTRY/ep3devops/backend-despachos:$IMAGE_TAG
        docker push $ECR_REGISTRY/ep3devops/backend-despachos:latest

    - name: Configure Kubectl & Deploy
      run: |
        aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}
        
        # Aplicamos secretos, base de datos y luego los backends en Kubernetes
        kubectl apply -f k8s/secrets.yaml
        kubectl apply -f k8s/database.yaml
        kubectl apply -f k8s/api-ventas.yaml
        kubectl apply -f k8s/api-despachos.yaml

        # Fijamos la imagen exacta que acabamos de publicar en ECR para evitar depender de latest
        kubectl set image deployment/api-ventas-deploy ventas=$ECR_REGISTRY/ep3devops/backend-ventas:$IMAGE_TAG
        kubectl set image deployment/api-despachos-deploy despachos=$ECR_REGISTRY/ep3devops/backend-despachos:$IMAGE_TAG
        
        # Reiniciamos los deployments para que K8s tome la nueva imagen que subimo
        kubectl rollout restart deployment mysql-db-deploy