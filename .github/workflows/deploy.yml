name: CI/CD Backend Monorepo ECS Fargate

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  ECS_CLUSTER: cluster-examen-final

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and Push Images
      id: build-push
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/devops/backend-ventas:$IMAGE_TAG -t $ECR_REGISTRY/devops/backend-ventas:latest back-Ventas_SpringBoot/Springboot-API-REST
        docker push $ECR_REGISTRY/devops/backend-ventas:$IMAGE_TAG
        docker push $ECR_REGISTRY/devops/backend-ventas:latest
        
        docker build -t $ECR_REGISTRY/devops/backend-despachos:$IMAGE_TAG -t $ECR_REGISTRY/devops/backend-despachos:latest back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        docker push $ECR_REGISTRY/devops/backend-despachos:$IMAGE_TAG
        docker push $ECR_REGISTRY/devops/backend-despachos:latest
        
        echo "VENTAS_IMAGE=$ECR_REGISTRY/devops/backend-ventas:$IMAGE_TAG" >> $GITHUB_ENV
        echo "DESPACHOS_IMAGE=$ECR_REGISTRY/devops/backend-despachos:$IMAGE_TAG" >> $GITHUB_ENV

    - name: Resolve Task Definitions
      shell: bash
      env:
        EXEC_ROLE_ARN: ${{ secrets.EXEC_ROLE_ARN }}
        TASK_ROLE_ARN: ${{ secrets.TASK_ROLE_ARN }}
        SECRET_ARN: ${{ secrets.SECRET_ARN }}
        DB_ENDPOINT: ${{ secrets.DB_ENDPOINT }}
        DB_NAME: ${{ secrets.DB_NAME }}
      run: |
        envsubst < .aws/task-def-ventas.json > .aws/task-def-ventas.json
        envsubst < .aws/task-def-despachos.json > .aws/task-def-despachos.json

    - name: Render Ventas
      id: render-ventas
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: .aws/task-def-ventas.json
        container-name: contenedor-ventas
        image: ${{ env.VENTAS_IMAGE }}
        
    - name: Render Despachos
      id: render-despachos
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: .aws/task-def-despachos.json
        container-name: contenedor-despachos
        image: ${{ env.VENTAS_IMAGE }}

    - name: Deploy Ventas
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.render-ventas.outputs.task-definition }}
        service: servicio-ventas
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

    - name: Deploy Despachos
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.render-ventas.outputs.task-definition }}
        service: servicio-despachos
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

