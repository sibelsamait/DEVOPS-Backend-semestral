name: CI/CD Backend Monorepo ECS Fargate

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-2
  ECS_CLUSTER: cluster-examen-final

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build and Test
      run: |
        mvn -B clean package -f back-Ventas_SpringBoot/Springboot-API-REST/pom.xml
        mvn -B clean package -f back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/pom.xml

    - name: Build and Push Images
      id: build-push
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Ventas
        docker build -t $ECR_REGISTRY/devops/backend-ventas:$IMAGE_TAG -t $ECR_REGISTRY/devops/backend-ventas:latest back-Ventas_SpringBoot/Springboot-API-REST
        docker push $ECR_REGISTRY/devops/backend-ventas:$IMAGE_TAG
        docker push $ECR_REGISTRY/devops/backend-ventas:latest
        
        # Despachos
        docker build -t $ECR_REGISTRY/devops/backend-despachos:$IMAGE_TAG -t $ECR_REGISTRY/devops/backend-despachos:latest back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        docker push $ECR_REGISTRY/devops/backend-despachos:$IMAGE_TAG
        docker push $ECR_REGISTRY/devops/backend-despachos:latest
        
        echo "VENTAS_IMAGE=$ECR_REGISTRY/devops/backend-ventas:$IMAGE_TAG" >> $GITHUB_ENV
        echo "DESPACHOS_IMAGE=$ECR_REGISTRY/devops/backend-despachos:$IMAGE_TAG" >> $GITHUB_ENV

    - name: Resolve Task Definitions
      shell: bash
      env:
        EXEC_ROLE_ARN: ${{ secrets.EXEC_ROLE_ARN }}
        TASK_ROLE_ARN: ${{ secrets.TASK_ROLE_ARN }}
        SECRET_ARN: ${{ secrets.SECRET_ARN }}
        DB_ENDPOINT: ${{ secrets.DB_ENDPOINT }}
        DB_NAME: ${{ secrets.DB_NAME }}
        VENTAS_IMAGE: ${{ env.VENTAS_IMAGE }}
        DESPACHOS_IMAGE: ${{ env.DESPACHOS_IMAGE }}
      run: |
        # Inyecta variables de entorno y reemplaza PLACEHOLDER por la imagen real
        cat .aws/task-def-ventas.json | envsubst | sed "s|PLACEHOLDER|$VENTAS_IMAGE|g" > .aws/task-def-ventas-resolved.json
        cat .aws/task-def-despachos.json | envsubst | sed "s|PLACEHOLDER|$DESPACHOS_IMAGE|g" > .aws/task-def-despachos-resolved.json

    - name: Deploy Ventas
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: .aws/task-def-ventas-resolved.json
        service: servicio-ventas
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

    - name: Deploy Despachos
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: .aws/task-def-despachos-resolved.json
        service: servicio-despachos
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true
